name: Ngnix Local Root Node
author: Arne Tarara
description: Serve a local package from /tmp/repo via NGINX and access it with Playwright.

compose-file: !include docker-compose-node.yml

flow:
  - name: Copy File
    container: playwright-runner
    hidden: true
    commands:
      - type: console
        command: cp /tmp/repo/playwright/check-website.js /tmp

  - name: Close Browser
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli close-all
        log-stdout: true
        read-notes-stdout: true

  - name: Open Browser
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli open --browser=firefox --headed
        log-stdout: true
        read-notes-stdout: true

  - name: Try 1
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli goto --browser=firefox http://nginx
        log-stdout: true
        read-notes-stdout: true
        note: goto nginx
      - type: console
        command: sleep 5
        note: Sleep 5


  - name: Close Browser
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli close-all
        log-stdout: true
        read-notes-stdout: true

  - name: Open Browser
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli open --browser=firefox --headed
        log-stdout: true
        read-notes-stdout: true

  - name: Try 2
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli goto --browser=firefox http://nginx
        log-stdout: true
        read-notes-stdout: true
        note: goto nginx
      - type: console
        command: sleep 5
        note: Sleep 5

  - name: Close Browser
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli close-all
        log-stdout: true
        read-notes-stdout: true

  - name: Open Browser
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli open --browser=firefox --headed
        log-stdout: true
        read-notes-stdout: true

  - name: Try 3
    container: playwright-runner
    commands:
      - type: console
        command: /tmp/node_modules/.bin/playwright-cli goto --browser=firefox http://nginx
        log-stdout: true
        read-notes-stdout: true
        note: goto nginx
      - type: console
        command: sleep 5
        note: Sleep 5
