name: Ngnix Local Root Node
author: Arne Tarara
description: Serve a local package from /tmp/repo via NGINX and access it with Playwright.

compose-file: !include docker-compose-node.yml

flow:
  - name: Install NPM
    container: playwright-runner
    hidden: true
    commands:
      - type: console
        command: cp /tmp/repo/playwright/check-website.js /tmp
      - type: console
        command: cd /tmp && npm install playwright
        shell: bash

  - name: Access local webserver and idle
    container: playwright-runner
    commands:
      - type: console
        command: HEADLESS=__GMT_VAR_HEADLESS__ node /tmp/check-website.js
        log-stdout: true
        read-notes-stdout: true
        shell: bash
