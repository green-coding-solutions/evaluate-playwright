name: Ngnix Local Root Node
author: Arne Tarara
description: Serve a local package from /tmp/repo via NGINX and access it with Playwright.

compose-file: !include docker-compose-node.yml

flow:
  - name: Install
    container: playwright-runner
    hidden: true
    commands:
      - type: console
        command: npm install -g @playwright/cli@latest playwright

  - name: Open Browser
    container: playwright-runner
    commands:
      - type: console
        command: playwright-cli open --browser=firefox --headed
        log-stdout: true
        read-notes-stdout: true

  - name: Try 1
    container: playwright-runner
    commands:
      - type: console
        command: playwright-cli goto --browser=firefox http://nginx
        log-stdout: true
        read-notes-stdout: true
        note: goto nginx
      - type: console
        command: sleep 5
        note: Sleep 5

  - name: Try 2
    container: playwright-runner
    commands:
      - type: console
        command: playwright-cli goto --browser=firefox http://nginx
        log-stdout: true
        read-notes-stdout: true
        note: goto nginx
      - type: console
        command: sleep 5
        note: Sleep 5

  - name: Try 3
    container: playwright-runner
    commands:
      - type: console
        command: playwright-cli goto --browser=firefox http://nginx
        log-stdout: true
        read-notes-stdout: true
        note: goto nginx
      - type: console
        command: sleep 5
        note: Sleep 5